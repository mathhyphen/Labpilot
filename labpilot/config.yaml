# LabPilot Configuration
# =========================================================================================
# AI 配置 - MiniMax Token Plan
# =========================================================================================
ai:
  # MiniMax API Token Plan 配置
  api_key: ""  # 请替换为您的 MiniMax API Key

  # MiniMax API 地址 (OpenAI 兼容接口)
  base_url: "https://api.minimaxi.com/v1"

  # MiniMax 模型名称: MiniMax-M2.7 或 MiniMax-M2.7-highspeed
  model: "MiniMax-M2.7-highspeed"

  # 请求超时时间（秒）
  timeout: 120

  # 语言设置: zh-CN 或 en
  language: "zh-CN"

# =========================================================================================
# 通知配置 - 钉钉机器人
# =========================================================================================
notification:
  # 启用的通知渠道: dingtalk, ntfy
  active: []
  dingtalk:
    # --------------------------------------------------------------------------------------
    # 钉钉群聊机器人配置
    # 配置完成后，实验通知将通过钉钉机器人发送到指定群聊
    # --------------------------------------------------------------------------------------
    # 钉钉机器人Webhook URL：
    # 1. 打开钉钉群聊 → 群设置 → 智能群助手 → 添加机器人
    # 2. 选择「自定义」机器人 → 填写机器人名称 → 选择安全设置
    # 3. 复制生成的Webhook URL到下方配置
    webhook_url: ""  # 请替换为实际Webhook URL
    
    # 请求超时时间（秒）
    timeout: 5
    
    # 钉钉机器人签名密钥（可选）
    # 如果在创建机器人时选择了「加签」安全设置，需填写此密钥
    secret: ""  # 可选，加签密钥

# =========================================================================================
# 数据库配置
# =========================================================================================
database:
  # 数据库文件路径，支持绝对路径和相对路径
  # 注意：如果需要多服务器共享数据库，请配置为网络共享路径或使用集中式数据库
  path: "./labpilot.db"

# =========================================================================================
# 日志配置
# =========================================================================================
logging:
  level: "INFO"
  # 通知中包含的日志行数
  max_log_lines: 20

# =========================================================================================
# Git配置
# =========================================================================================
git:
  # 是否自动记录Git提交信息
  auto_snapshot: true
  # 是否要求Git工作区干净才能运行实验
  require_clean: false

# =========================================================================================
# 超时配置
# =========================================================================================
timeout:
  # 实验默认超时时间（秒）
  # 0 表示无超时限制，适合长时间运行的实验
  default: 0  # 建议：长时间实验设置为0，短时间实验设置为具体秒数

# =========================================================================================
# 配置示例
# =========================================================================================
# 示例1：基本钉钉机器人配置
# notification:
#   dingtalk:
#     webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=your-token"

# 示例2：带签名的钉钉机器人配置
# notification:
#   dingtalk:
#     webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=your-token"
#     secret: "your-secret"

# 示例3：无超时限制
# timeout:
#   default: 0

# =========================================================================================
# 常见问题解决方案
# =========================================================================================
# 1. 钉钉机器人通知发送失败，错误码310000
#    解决方案：请检查webhook_url是否正确
#    步骤：重新复制钉钉机器人的Webhook URL，确保包含完整的access_token参数

# 2. 钉钉机器人通知发送失败，错误码310002
#    解决方案：请检查消息内容是否包含敏感词
#    步骤：修改消息内容，避免使用敏感词

# 3. 钉钉机器人通知发送失败，错误码310003
#    解决方案：请检查机器人发送频率是否超过限制
#    步骤：钉钉机器人每分钟最多发送20条消息，请减少发送频率
